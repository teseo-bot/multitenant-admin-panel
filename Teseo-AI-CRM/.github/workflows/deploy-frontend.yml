name: Deploy Teseo-AI-CRM Frontend to Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PROJECT_ID: teseobot-487515
  REGION: us-central1
  SERVICE_NAME: crm-frontend
  GAR_LOCATION: us-central1-docker.pkg.dev
  REPOSITORY: crm-agentico
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-deploy:
    name: Build & Deploy to Cloud Run
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: Configure Docker for GCP Artifact Registry
        run: |-
          gcloud auth configure-docker ${{ env.GAR_LOCATION }}

      - name: Build Docker Image
        working-directory: .
        env:
          SUPA_URL: ${{ secrets.MISSION_CONTROL_SUPABASE_URL }}
          SUPA_ANON: ${{ secrets.MISSION_CONTROL_SUPABASE_ANON_KEY }}
        run: |-
          docker build -t ${{ env.GAR_LOCATION }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
          --build-arg NEXT_PUBLIC_SUPABASE_URL="$SUPA_URL" \
          --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="$SUPA_ANON" -f ./Dockerfile .

      - name: Push Image to Artifact Registry
        run: |-
          docker push ${{ env.GAR_LOCATION }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.GAR_LOCATION }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          env_vars: |
            NODE_ENV=production
          secrets: |
            DATABASE_URL=DATABASE_URL:latest
            DB_PASSWORD=DB_PASSWORD:latest
            JWT_SECRET=JWT_SECRET:latest
            KDB_DATABASE_URL=KDB_DATABASE_URL:latest
            M2M_API_KEY=M2M_API_KEY:latest
            MISSION_CONTROL_INTERNAL_API_KEY=MISSION_CONTROL_INTERNAL_API_KEY:latest
            MISSION_CONTROL_SUPABASE_ANON_KEY=MISSION_CONTROL_SUPABASE_ANON_KEY:latest
            MISSION_CONTROL_SUPABASE_SERVICE_KEY=MISSION_CONTROL_SUPABASE_SERVICE_KEY:latest
            MISSION_CONTROL_SUPABASE_URL=MISSION_CONTROL_SUPABASE_URL:latest
            OCR_BASE_URL=OCR_BASE_URL:latest
            OPENAI_API_KEY=OPENAI_API_KEY:latest
            OPENCLAW_GATEWAY_URL=OPENCLAW_GATEWAY_URL:latest
            REDIS_PASSWORD=REDIS_PASSWORD:latest
            REDIS_URL=REDIS_URL:latest
            TELEGRAM_BOT_TOKEN=TELEGRAM_BOT_TOKEN:latest
            TELEGRAM_STAFF_GROUPS=TELEGRAM_STAFF_GROUPS:latest
            WHATSAPP_API_TOKEN=WHATSAPP_API_TOKEN:latest
            WHATSAPP_PHONE_NUMBER_ID=WHATSAPP_PHONE_NUMBER_ID:latest
            WHATSAPP_VERIFY_TOKEN=WHATSAPP_VERIFY_TOKEN:latest

      - name: Show Deployment URL
        run: echo "Deployed URL - ${{ steps.deploy.outputs.url }}"